name: Update kantinen menu

on:
  schedule:
    - cron: '0 7 * * 1'  # Every Monday at 07:00 UTC
  workflow_dispatch:       # Manual trigger for testing

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch, parse and publish menu
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: 281366dbec59add933ff042a9ebef891
          RSS_URL: https://kill-the-newsletter.com/feeds/wh1q510277r6m7om09fw.xml
        run: |
          python3 << 'EOF'
          import urllib.request, json, os, re
          from xml.etree import ElementTree as ET
          from html.parser import HTMLParser

          # --- Strip HTML tags ---
          class MLStripper(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.fed = []
              def handle_data(self, d):
                  self.fed.append(d)
              def get_data(self):
                  return '\n'.join(self.fed)

          def strip_html(html):
              s = MLStripper()
              s.feed(html)
              return s.get_data()

          # --- Fetch RSS ---
          print("Fetching RSS feed...")
          with urllib.request.urlopen(os.environ['RSS_URL']) as r:
              xml_data = r.read()

          root = ET.fromstring(xml_data)
          ns = {'atom': 'http://www.w3.org/2005/Atom'}
          entries = root.findall('atom:entry', ns)
          if not entries:
              raise Exception("No entries in RSS feed")

          latest = entries[0]
          content_el = latest.find('atom:content', ns) or latest.find('atom:summary', ns)
          raw = content_el.text if content_el is not None else ''
          email_text = strip_html(raw).strip()
          print(f"Got email ({len(email_text)} chars)")

          # --- Parse with Claude ---
          print("Parsing with Claude...")
          prompt = f"""Extract the weekly canteen menu from this Danish email. Return ONLY valid JSON, no explanation, no markdown fences.

          JSON format:
          {{
            "monday": {{ "starter": "...", "main": "...", "dessert": null }},
            "tuesday": {{ "starter": "...", "main": "...", "dessert": null }},
            "wednesday": {{ "starter": "...", "main": "...", "dessert": null }},
            "thursday": {{ "starter": "...", "main": "...", "dessert": null }},
            "friday": {{ "starter": "...", "main": "...", "dessert": null }}
          }}

          Rules:
          - Use null for missing fields
          - "starter" can be salad, soup, cold starter etc.
          - "***" separates starter from main
          - Preserve original Danish text
          - If friday is "Koldt bord" put it in "main"

          Email:
          {email_text}"""

          payload = json.dumps({
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 1000,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload, method="POST",
              headers={
                  "x-api-key": os.environ['ANTHROPIC_API_KEY'],
                  "anthropic-version": "2023-06-01",
                  "Content-Type": "application/json"
              }
          )
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())

          text = data['content'][0]['text'].replace('```json','').replace('```','').strip()
          menu = json.loads(text)
          print(f"Parsed menu: {list(menu.keys())}")

          # --- Push to Gist ---
          print("Pushing to Gist...")
          payload = json.dumps({
              "files": {"menu.json": {"content": json.dumps(menu, indent=2, ensure_ascii=False)}}
          }).encode()

          req = urllib.request.Request(
              f"https://api.github.com/gists/{os.environ['GIST_ID']}",
              data=payload, method="PATCH",
              headers={
                  "Authorization": f"Bearer {os.environ['GIST_TOKEN']}",
                  "Content-Type": "application/json"
              }
          )
          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())
              print(f"✓ Gist updated: {result['id']}")

          EOF
