<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kantinen — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #f4f4f2;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 1rem;
  }
  .container { width: 100%; max-width: 680px; }
  h1 { font-size: 1.6rem; font-weight: 500; margin-bottom: 0.25rem; }
  .sub { color: #888; font-size: 0.85rem; margin-bottom: 2rem; }

  .card {
    background: white;
    border-radius: 12px;
    padding: 1.75rem;
    margin-bottom: 1rem;
    border: 1px solid #e8e8e4;
  }

  label { display: block; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #666; margin-bottom: 0.5rem; }

  input[type="password"], input[type="text"], textarea {
    width: 100%;
    padding: 0.65rem 0.9rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.9rem;
    background: #fafafa;
    transition: border-color 0.2s;
    margin-bottom: 1rem;
  }
  input:focus, textarea:focus { outline: none; border-color: #c8a96e; background: white; }

  textarea { min-height: 260px; resize: vertical; font-size: 0.85rem; line-height: 1.6; }

  button {
    width: 100%;
    padding: 0.85rem;
    background: #1a1814;
    color: white;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #2d2a24; }
  button:disabled { background: #999; cursor: not-allowed; }

  .preview {
    background: #fafaf8;
    border: 1px solid #e8e8e4;
    border-radius: 10px;
    padding: 1.25rem;
    font-size: 0.85rem;
    line-height: 1.7;
    white-space: pre-wrap;
    font-family: 'Courier New', monospace;
    color: #444;
    margin-top: 1rem;
    display: none;
  }

  .status {
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.88rem;
    display: none;
  }
  .status.ok { background: #e8f5e9; color: #2e7d32; display: block; }
  .status.err { background: #fce4e4; color: #c62828; display: block; }
  .status.loading { background: #fff8e1; color: #f57f17; display: block; }

  .config-note { font-size: 0.78rem; color: #aaa; margin-top: 0.4rem; }
</style>
</head>
<body>
<div class="container">
  <h1>🍽 Kantinen Admin</h1>
  <p class="sub">Indsæt ugens menuemail — Claude parser den og opdaterer siden automatisk.</p>

  <div class="card">
    <label>GitHub Gist ID</label>
    <input type="text" id="gistId" placeholder="abc123def456..." />
    <label>GitHub Token (gist scope)</label>
    <input type="password" id="githubToken" placeholder="ghp_..." />
    <p class="config-note">Tokens gemmes kun i din browser (localStorage). Forlader aldrig din maskine.</p>
  </div>

  <div class="card">
    <label>Anthropic API Key</label>
    <input type="password" id="anthropicKey" placeholder="sk-ant-..." />
    <p class="config-note">Bruges kun til at parse emailen. Gemmes lokalt.</p>
  </div>

  <div class="card">
    <label>Indsæt menumail her</label>
    <textarea id="emailText" placeholder="Kære alle sammen...&#10;&#10;Menu for uge XX-XXXX&#10;..."></textarea>
    <button id="parseBtn" onclick="parseAndPublish()">Parse & Publicer menu</button>
    <div class="status" id="status"></div>
    <div class="preview" id="preview"></div>
  </div>
</div>

<script>
  // Restore saved values
  ['gistId','githubToken','anthropicKey'].forEach(k => {
    const el = document.getElementById(k);
    const saved = localStorage.getItem('kantinen_' + k);
    if (saved) el.value = saved;
    el.addEventListener('change', () => localStorage.setItem('kantinen_' + k, el.value));
  });

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  async function parseAndPublish() {
    const gistId = document.getElementById('gistId').value.trim();
    const ghToken = document.getElementById('githubToken').value.trim();
    const anthropicKey = document.getElementById('anthropicKey').value.trim();
    const emailText = document.getElementById('emailText').value.trim();
    const btn = document.getElementById('parseBtn');

    if (!gistId || !ghToken || !anthropicKey || !emailText) {
      setStatus('Udfyld alle felter.', 'err'); return;
    }

    btn.disabled = true;
    setStatus('Sender til Claude...', 'loading');

    // Step 1: Parse with Claude
    let menu;
    try {
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': anthropicKey,
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `Extract the weekly canteen menu from this Danish email. Return ONLY valid JSON, no explanation, no markdown fences.

JSON format:
{
  "monday": { "starter": "...", "main": "...", "dessert": "..." },
  "tuesday": { "starter": "...", "main": "...", "dessert": "..." },
  "wednesday": { "starter": "...", "main": "...", "dessert": "..." },
  "thursday": { "starter": "...", "main": "...", "dessert": "..." },
  "friday": { "starter": "...", "main": "...", "dessert": "..." }
}

Rules:
- Use null for missing fields (e.g. no dessert)
- "starter" can be salad, soup, cold starter etc.
- "***" in the email separates starter from main
- Preserve original Danish text, don't translate
- If friday is "Koldt bord" or similar, put it in "main"

Email:
${emailText}`
          }]
        })
      });
      const data = await r.json();
      const text = data.content[0].text.replace(/```json|```/g, '').trim();
      menu = JSON.parse(text);
    } catch(e) {
      setStatus('Claude fejl: ' + e.message, 'err');
      btn.disabled = false;
      return;
    }

    // Show preview
    const preview = document.getElementById('preview');
    preview.style.display = 'block';
    preview.textContent = JSON.stringify(menu, null, 2);

    setStatus('Menu parsed ✓ — uploader til Gist...', 'loading');

    // Step 2: Push to Gist
    try {
      const r = await fetch(`https://api.github.com/gists/${gistId}`, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + ghToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          files: { 'menu.json': { content: JSON.stringify(menu, null, 2) } }
        })
      });
      if (!r.ok) throw new Error('GitHub svarede: ' + r.status);
      setStatus('✓ Menu publiceret! Siden opdateres automatisk.', 'ok');
    } catch(e) {
      setStatus('GitHub fejl: ' + e.message, 'err');
    }

    btn.disabled = false;
  }
</script>
</body>
</html>
